services:
  kubekosh:
    image: zeborg/kubekosh:latest
    container_name: kubekosh
    restart: unless-stopped
    privileged: true
    stdin_open: true
    tty: true
    ports:
      - "7554:80"
    volumes:
      - kubekosh-data:/data
      # - ./scenarios:/app/scenarios    # to use local scenarios
      # - ./addons:/app/addons          # to use local addons
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health | jq -e '.api == \"ok\"' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
volumes:
  kubekosh-data: